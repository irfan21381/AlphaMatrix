name: RL-LLM Thermal Manager
version: 1.0

environment:
  type: rl
  observation_space:
    cpu: float
    battery: float
  action_space:
    - optimize_cpu
    - close_apps
    - throttle_gpu
    - hibernate_idle

entrypoint:
  reset: /reset
  step: /step

protocol:
  reset_method: POST
  step_method: POST